<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="display-expression" id="expression"></div>
            <div class="display-result" id="result">0</div>
        </div>

        <div class="buttons">
            <!-- Scientific functions row -->
            <button class="btn scientific" data-action="sin">sin</button>
            <button class="btn scientific" data-action="cos">cos</button>
            <button class="btn scientific" data-action="tan">tan</button>
            <button class="btn scientific" data-action="ln">ln</button>
            <button class="btn scientific" data-action="log10">log10</button>

            <!-- Row 1 -->
            <button class="btn" data-action="clear">C</button>
            <button class="btn" data-action="percentage">%</button>
            <button class="btn" data-action="backspace">&larr;</button>
            <button class="btn operator" data-action="divide">&divide;</button>

            <!-- Row 2 -->
            <button class="btn number" data-value="7">7</button>
            <button class="btn number" data-value="8">8</button>
            <button class="btn number" data-value="9">9</button>
            <button class="btn operator" data-action="multiply">&times;</button>

            <!-- Row 3 -->
            <button class="btn number" data-value="4">4</button>
            <button class="btn number" data-value="5">5</button>
            <button class="btn number" data-value="6">6</button>
            <button class="btn operator" data-action="subtract">&minus;</button>

            <!-- Row 4 -->
            <button class="btn number" data-value="1">1</button>
            <button class="btn number" data-value="2">2</button>
            <button class="btn number" data-value="3">3</button>
            <button class="btn operator" data-action="add">+</button>

            <!-- Row 5 -->
            <button class="btn number zero" data-value="0">0</button>
            <button class="btn number" data-value=".">.</button>
            <button class="btn equals" data-action="equals">=</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
